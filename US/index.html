<meta charset="UTF-8">

<meta name="theme-color" content="#0E2A47">
<meta name="robots" content="noindex,follow">
<title>CalcBox US — Coming Soon</title>
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0E2A47;--ink-soft:#5A6E84;--paper:#F6F8FB;--line:#E3E9F0;--gold:#C28A1A;--gold-soft:#FBEED3;--gold-text:#B07A14}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Space Grotesk','Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--ink)}
.hdr{max-width:820px;margin:0 auto;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 1.25rem;width:100%}
.logo{font-size:17px;font-weight:700;color:#fff;text-decoration:none;display:flex;align-items:center;gap:9px}
.logo .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#1E456E,#0E2A47);border:1.5px solid rgba(243,201,105,.25);color:#F3C969;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
.back-btn{font-size:12px;font-weight:700;color:rgba(255,255,255,.9);text-decoration:none;padding:5px 13px;border-radius:8px;border:1px solid rgba(255,255,255,.22)}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem;text-align:center}
.badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.14em;color:#9A6A0C;background:var(--gold-soft);padding:5px 14px;border-radius:999px;margin-bottom:1.2rem}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--gold);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
h1{font-size:clamp(26px,5vw,40px);font-weight:700;line-height:1.25;margin-bottom:.6rem}
h1 em{font-style:normal;color:var(--gold-text)}
p{font-size:14px;color:var(--ink-soft);line-height:1.8;max-width:420px;margin:0 auto 1.6rem}
.btn{display:inline-block;background:var(--ink);color:#fff;font-size:14px;font-weight:700;text-decoration:none;padding:12px 32px;border-radius:12px}
.btn:hover{box-shadow:0 8px 20px -8px rgba(14,42,71,.4)}

.tab-btn .tab-ico{width:16px;height:16px;flex-shrink:0}
.tab-btn span{display:inline-block}
</style>
</head>
<body>
<header>
  <div class="hdr">
    <a class="logo" href="/"><span class="mark">C</span>CalcBox <span style="font-size:12px;color:rgba(255,255,255,.75);font-weight:400">/ US</span></a>
    <a class="back-btn" href="/">‹ 繁體中文</a>
  </div>
</header>
<main>
  <div>
    <span class="badge">UNDER CONSTRUCTION</span>
    <h1>CalcBox <em>US</em> is<br>coming soon</h1>
    <p>We're building US-localized calculators — mortgage, federal &amp; state tax, 401(k), and more. In the meantime, our Taiwan edition with 115 free tools is fully available.</p>
    <a class="btn" href="/">Browse all tools (繁體中文)</a>
  </div>
</main>
</body>
</html>
