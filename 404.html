<title>找不到頁面｜CalcBox 工具站</title>
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
:root{--ink:#0E2A47;--ink-soft:#5A6E84;--paper:#F6F8FB;--line:#E3E9F0;--gold:#C28A1A;--gold-text:#B07A14}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
header{background:var(--ink)}
.hdr{max-width:820px;margin:0 auto;height:54px;display:flex;align-items:center;padding:0 1.25rem}
.logo{font-size:17px;font-weight:800;color:#fff;text-decoration:none;display:flex;align-items:center;gap:9px}
.logo .mark{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,#1E456E,#0E2A47);border:1.5px solid rgba(243,201,105,.25);color:#F3C969;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem}
.box{text-align:center;max-width:480px}
.code{font-family:'Space Grotesk',sans-serif;font-size:88px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-2px}
.code em{font-style:normal;color:var(--gold)}
h1{font-size:20px;font-weight:900;margin:.8rem 0 .5rem}
p{font-size:14px;color:var(--ink-soft);line-height:1.8;margin-bottom:1.6rem}
.btn{display:inline-block;background:var(--ink);color:#fff;font-size:14px;font-weight:700;text-decoration:none;padding:12px 32px;border-radius:12px;transition:transform .15s,box-shadow .15s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px -8px rgba(14,42,71,.4)}
.hot{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:1.6rem}
.hot a{font-size:12px;font-weight:600;color:var(--ink-soft);background:#fff;border:1px solid var(--line);padding:5px 14px;border-radius:99px;text-decoration:none}
.hot a:hover{color:var(--gold-text);border-color:var(--gold)}
</style>
</head>
<body>
<header>
  <div class="hdr">
    <a class="logo" href="/"><span class="mark">C</span>CalcBox</a>
  </div>
</header>
<main>
  <div class="box">
    <div class="code">4<em>0</em>4</div>
    <h1>這個頁面算不出來</h1>
    <p>您要找的頁面可能已搬移或不存在。<br>回到工具目錄，115 個計算器等著您。</p>
    <a class="btn" href="/">回到所有工具</a>
    <div class="hot">
      <a href="/loan/">房貸試算</a>
      <a href="/health/">BMI</a>
      <a href="/fx/">匯率換算</a>
      <a href="/tax/">所得稅</a>
      <a href="/calendar/">2026行事曆</a>
    </div>
  </div>
</main>
</body>
</html>
