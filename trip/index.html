<style>
/* ══ Design Tokens ══ */
:root{
  --navy:#0E2A47; --navy-mid:#1B3A5C; --navy-soft:#2D5073;
  --gold:#C28A1A; --gold-mid:#D4A020; --gold-soft:#FBF0D5; --gold-pale:#FEF9EE;
  --green:#2E7D32; --green-lt:#E8F5E9;
  --red:#C62828; --red-lt:#FFEBEE;
  --blue:#1565C0; --blue-lt:#E3F0FC;
  --amber:#C58A12;
  --bg:#F4F6FA; --surface:#fff; --surface-2:#F8FAFC;
  --border:#E0E7EF; --border-2:#ECF1F7;
  --ink:#16212E; --muted:#5A6E84; --hint:#98A4B3;
  --r:14px; --r-sm:10px; --r-xs:7px;

  /* 類別色 */
  --cat-food:#E65100;
  --cat-transport:#1565C0;
  --cat-hotel:#6A1B9A;
  --cat-shop:#C62828;
  --cat-ticket:#2E7D32;
  --cat-other:#546E7A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'Noto Sans TC',-apple-system,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;min-height:100dvh}
button,input,select,textarea{font-family:inherit}
a:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--gold);outline-offset:2px;border-radius:4px}

/* ── Header ── */
header{background:var(--navy);padding:0 1rem;position:sticky;top:0;z-index:400;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.hdr{max-width:480px;margin:0 auto;height:52px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:16px;font-weight:800;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px}
.logo .mark{width:24px;height:24px;border-radius:7px;background:linear-gradient(135deg,#1E456E,var(--navy));border:1.5px solid rgba(243,201,105,.3);color:#F3C969;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900}
.hdr-rate{font-size:11px;color:rgba(255,255,255,.65);display:flex;align-items:center;gap:5px}
.hdr-rate .dot{width:6px;height:6px;border-radius:50%;background:#4CAF50;flex-shrink:0}
.hdr-rate .dot.loading{background:var(--gold-mid);animation:blink 1s infinite}
.hdr-rate .dot.err{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Bottom Nav ── */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:400;background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(14,42,71,.08)}
.bnav-inner{max-width:480px;margin:0 auto;display:flex;height:58px;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;cursor:pointer;color:var(--hint);font-size:10px;font-weight:700;letter-spacing:.02em;padding:0;transition:color .15s;-webkit-tap-highlight-color:transparent}
.bnav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s}
.bnav-btn.active{color:var(--navy-mid)}
.bnav-btn.active svg{stroke:var(--gold)}
.bnav-btn.add-btn{color:#fff;flex:none;width:56px;margin:0 8px}
.bnav-btn.add-btn .add-circle{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--navy-mid),var(--navy));box-shadow:0 4px 14px rgba(14,42,71,.4);display:flex;align-items:center;justify-content:center;margin-bottom:2px;transition:transform .15s,box-shadow .15s}
.bnav-btn.add-btn:hover .add-circle,.bnav-btn.add-btn:active .add-circle{transform:scale(1.06);box-shadow:0 6px 18px rgba(14,42,71,.5)}
.bnav-btn.add-btn svg{width:22px;height:22px;stroke:#F3C969;margin:0}

/* ── Pages ── */
.page{display:none;max-width:480px;margin:0 auto;padding:1rem 1rem 80px}
.page.active{display:block}

/* ── Setup Screen ── */
.setup-hero{text-align:center;padding:2.5rem 1rem 1.5rem}
.setup-hero .plane{font-size:56px;line-height:1;margin-bottom:12px}
.setup-hero h1{font-size:24px;font-weight:900;color:var(--navy);letter-spacing:-.3px;margin-bottom:6px}
.setup-hero p{font-size:13px;color:var(--muted);line-height:1.7}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1.4rem;margin-bottom:1rem;box-shadow:0 2px 8px rgba(14,42,71,.05)}
.setup-card h2{font-size:13px;font-weight:800;color:var(--navy);letter-spacing:.06em;text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:7px}
.setup-card h2::before{content:'';width:10px;height:10px;border-radius:3px;background:var(--gold);flex-shrink:0}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.field:last-child{margin-bottom:0}
.field label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.field input,.field select{height:44px;padding:0 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:14px;color:var(--ink);background:var(--surface-2);-webkit-appearance:none;transition:border .15s,box-shadow .15s}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,138,26,.14)}
.field input::placeholder{color:var(--hint)}
.fields-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* Members */
.member-list{display:flex;flex-direction:column;gap:7px;margin-bottom:10px}
.member-row{display:flex;align-items:center;gap:8px}
.member-badge{width:28px;height:28px;border-radius:50%;background:var(--gold-soft);color:var(--gold);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Space Grotesk',sans-serif}
.member-input{flex:1;height:38px;padding:0 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface-2)}
.member-input:focus{outline:none;border-color:var(--gold)}
.member-del{width:32px;height:32px;border:none;background:var(--red-lt);color:var(--red);border-radius:7px;font-size:16px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.add-member-btn{width:100%;height:38px;border:1.5px dashed var(--gold);background:var(--gold-pale);color:var(--gold);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer}

.start-btn{width:100%;height:52px;border:none;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--navy-mid),var(--navy));color:#fff;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:.02em;box-shadow:0 4px 14px rgba(14,42,71,.3);transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.start-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(14,42,71,.38)}

/* ── Summary (Home) ── */
.trip-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-mid) 100%);border-radius:var(--r);padding:1.3rem 1.4rem;margin-bottom:1rem;position:relative;overflow:hidden}
.trip-header::after{content:'✈';position:absolute;right:-8px;bottom:-16px;font-size:80px;opacity:.08;line-height:1;pointer-events:none}
.trip-name{font-size:11px;font-weight:700;color:rgba(255,255,255,.55);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.trip-dest{font-size:20px;font-weight:900;color:#fff;margin-bottom:2px}
.trip-dates{font-size:12px;color:rgba(255,255,255,.55)}
.budget-row{margin-top:14px;display:flex;align-items:flex-end;justify-content:space-between;gap:8px}
.budget-spent{font-size:11px;color:rgba(255,255,255,.55);margin-bottom:3px}
.budget-num{font-size:32px;font-weight:900;color:#fff;line-height:1;font-family:'Space Grotesk',sans-serif;letter-spacing:-1px}
.budget-num sup{font-size:14px;font-weight:700;vertical-align:top;margin-top:5px;display:inline-block;margin-right:1px;opacity:.7}
.budget-total{font-size:12px;color:rgba(255,255,255,.5);text-align:right}
.budget-total b{color:rgba(255,255,255,.8);display:block;font-size:14px;font-family:'Space Grotesk',sans-serif}
.budget-bar-wrap{margin-top:10px}
.budget-bar-track{height:6px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#F3C969,var(--gold-mid));transition:width .6s cubic-bezier(.2,.7,.3,1)}
.budget-bar-fill.danger{background:linear-gradient(90deg,#FF7043,#C62828)}
.budget-pct{font-size:10px;color:rgba(255,255,255,.45);margin-top:4px;text-align:right}

/* Stat row */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:1rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 12px 10px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent,var(--navy-mid))}
.stat-lbl{font-size:9.5px;font-weight:700;color:var(--hint);letter-spacing:.05em;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-size:17px;font-weight:800;color:var(--ink);line-height:1;font-family:'Space Grotesk',sans-serif}
.stat-sub{font-size:10px;color:var(--hint);margin-top:3px}

/* Chart boxes */
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:1rem 1rem .8rem;margin-bottom:1rem}
.chart-card-title{font-size:12px;font-weight:800;color:var(--navy);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.chart-card-title::before{content:'';width:9px;height:9px;border-radius:2px;background:var(--gold);flex-shrink:0}
.chart-card-sub{font-size:10.5px;color:var(--hint);margin-bottom:10px}
.chart-card canvas,.chart-card svg{width:100%;display:block}

/* Cat legend */
.cat-legend{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.cat-legend span{font-size:10px;color:var(--muted);display:inline-flex;align-items:center;gap:4px}
.cat-legend i{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0}

/* Section label */
.section-label{font-size:10.5px;font-weight:700;color:var(--hint);letter-spacing:.1em;text-transform:uppercase;margin:1.2rem 0 .6rem;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* ── Entry list ── */
.entry-list{display:flex;flex-direction:column;gap:8px}
.entry-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:12px 14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s;-webkit-tap-highlight-color:transparent}
.entry-card:hover{box-shadow:0 4px 12px rgba(14,42,71,.08);transform:translateY(-1px)}
.entry-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cat-color,var(--navy-mid));border-radius:99px 0 0 99px}
.entry-cat-icon{width:36px;height:36px;border-radius:10px;background:var(--cat-bg,#F0F2F5);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.entry-body{flex:1;min-width:0}
.entry-desc{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.entry-meta{font-size:11px;color:var(--hint);margin-top:2px;display:flex;align-items:center;gap:6px}
.entry-payer{font-size:10px;font-weight:600;color:var(--muted);background:#F0F2F5;padding:2px 7px;border-radius:5px}
.entry-amounts{text-align:right;flex-shrink:0}
.entry-orig{font-size:15px;font-weight:800;color:var(--ink);font-family:'Space Grotesk',sans-serif;white-space:nowrap}
.entry-twd{font-size:11px;color:var(--hint);margin-top:2px;white-space:nowrap}
.entry-del{position:absolute;right:0;top:0;bottom:0;width:60px;background:var(--red);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;opacity:0;transition:opacity .2s;pointer-events:none;border-radius:0 var(--r-sm) var(--r-sm) 0}
.entry-card.swiped .entry-del{opacity:1;pointer-events:auto}

.empty-state{text-align:center;padding:3rem 1rem;color:var(--hint)}
.empty-state .icon{font-size:40px;margin-bottom:10px;opacity:.5}
.empty-state p{font-size:13px;line-height:1.7}

/* ── Add Entry Sheet ── */
.sheet-mask{position:fixed;inset:0;background:rgba(14,42,71,.45);z-index:500;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
.sheet-mask.open{display:flex}
.sheet{background:var(--surface);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);max-height:92dvh;overflow-y:auto;animation:sheetUp .3s cubic-bezier(.2,.7,.3,1)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
.sheet-head{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-2)}
.sheet-head h3{font-size:16px;font-weight:900;color:var(--navy)}
.sheet-close{width:30px;height:30px;border:none;background:var(--surface-2);border-radius:50%;cursor:pointer;font-size:16px;color:var(--muted);display:flex;align-items:center;justify-content:center}
.sheet-body{padding:1rem 1.1rem 1.4rem}

/* Amount input — big */
.amount-row{display:flex;align-items:center;gap:10px;margin-bottom:1.2rem;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:10px 14px;transition:border .15s}
.amount-row:focus-within{border-color:var(--gold);box-shadow:0 0 0 3px rgba(194,138,26,.12)}
.amount-input{flex:1;font-size:28px;font-weight:900;color:var(--navy);border:none;background:transparent;font-family:'Space Grotesk',sans-serif;min-width:0;-moz-appearance:textfield}
.amount-input::-webkit-inner-spin-button,.amount-input::-webkit-outer-spin-button{-webkit-appearance:none}
.amount-input:focus{outline:none}
.cur-select{height:38px;padding:0 8px;border:none;background:var(--gold-soft);color:var(--gold);font-size:13px;font-weight:800;border-radius:8px;cursor:pointer;font-family:inherit;-webkit-appearance:none;min-width:80px;text-align:center}
.cur-select:focus{outline:none}

/* TWD preview */
.twd-preview{text-align:center;font-size:12px;color:var(--muted);margin:-8px 0 12px;min-height:18px}
.twd-preview b{color:var(--navy);font-weight:800}

/* Rate mode toggle */
.rate-mode{display:flex;gap:7px;margin-bottom:1rem;align-items:center}
.rate-mode-label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;letter-spacing:.04em}
.rate-toggle{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:2px;gap:2px}
.rate-toggle button{flex:1;height:28px;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);background:transparent;padding:0 10px;transition:all .15s;white-space:nowrap}
.rate-toggle button.active{background:var(--navy);color:var(--gold-mid)}
.custom-rate-row{display:flex;align-items:center;gap:8px;margin-bottom:1rem;animation:fadeUp .2s ease}
.custom-rate-row label{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.custom-rate-row input{flex:1;height:36px;padding:0 10px;border:1.5px solid var(--border);border-radius:8px;font-size:14px;font-weight:700;color:var(--navy)}
.custom-rate-row input:focus{outline:none;border-color:var(--gold)}
.custom-rate-row .unit{font-size:11px;color:var(--hint);white-space:nowrap}

/* Cat grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.cat-btn{height:54px;border:1.5px solid var(--border);border-radius:var(--r-sm);background:var(--surface-2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.cat-btn .ico{font-size:20px;line-height:1}
.cat-btn .lbl{font-size:10px;font-weight:700;color:var(--muted)}
.cat-btn.active{border-width:2px}
.cat-btn[data-cat="food"].active{border-color:var(--cat-food);background:#FFF3E0}
.cat-btn[data-cat="transport"].active{border-color:var(--cat-transport);background:#E3F0FC}
.cat-btn[data-cat="hotel"].active{border-color:var(--cat-hotel);background:#F3E5F5}
.cat-btn[data-cat="shop"].active{border-color:var(--cat-shop);background:#FFEBEE}
.cat-btn[data-cat="ticket"].active{border-color:var(--cat-ticket);background:#E8F5E9}
.cat-btn[data-cat="other"].active{border-color:var(--cat-other);background:#ECEFF1}

/* Payer select pills */
.payer-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.payer-pill{height:32px;padding:0 12px;border:1.5px solid var(--border);border-radius:99px;background:var(--surface-2);font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.payer-pill.active{background:var(--navy);color:var(--gold-mid);border-color:var(--navy)}

.sheet-submit{width:100%;height:50px;border:none;border-radius:var(--r-sm);background:linear-gradient(135deg,var(--navy-mid),var(--navy));color:#fff;font-size:15px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(14,42,71,.3);transition:all .15s;letter-spacing:.02em}
.sheet-submit:hover{opacity:.92;transform:translateY(-1px)}
.sheet-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── Settings / Trip page ── */
.reset-btn{width:100%;height:44px;border:1.5px solid var(--red);border-radius:var(--r-sm);background:transparent;color:var(--red);font-size:14px;font-weight:700;cursor:pointer;margin-top:.5rem;transition:all .15s}
.reset-btn:hover{background:var(--red-lt)}
.export-btn{width:100%;height:44px;border:1.5px solid var(--navy-mid);border-radius:var(--r-sm);background:transparent;color:var(--navy-mid);font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;margin-bottom:.5rem}
.export-btn:hover{background:var(--blue-lt)}

/* ── Split page ── */
.split-member{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.split-badge{width:36px;height:36px;border-radius:50%;background:var(--gold-soft);color:var(--gold);font-size:14px;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Space Grotesk',sans-serif}
.split-info{flex:1}
.split-name{font-size:14px;font-weight:800;color:var(--ink)}
.split-amt{font-size:12px;color:var(--muted);margin-top:2px}
.split-bal{font-size:15px;font-weight:800;font-family:'Space Grotesk',sans-serif}
.split-bal.pos{color:var(--green)}
.split-bal.neg{color:var(--red)}
.split-bal.zero{color:var(--hint)}
.transfer-card{background:var(--gold-pale);border:1px solid rgba(194,138,26,.2);border-radius:var(--r-sm);padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--ink)}
.transfer-card .arrow{color:var(--gold);font-size:18px}
.transfer-card .amt{margin-left:auto;color:var(--gold);font-family:'Space Grotesk',sans-serif;font-weight:900}
.no-transfer{text-align:center;padding:1.5rem;color:var(--hint);font-size:13px}

/* ── Trip library (旅遊記憶) ── */

<script>
/* ══════════════════════════════
   CalcBox Trip — Main Script
══════════════════════════════ */
const LOCAL_RATE_URL = 'https://fx-rates-worker.alonsolu0204.workers.dev/rates/latest.json';
const STORAGE_KEY = 'calcbox_trip_v1';
const FX_CACHE_KEY = 'fx_last_bank_data';

/* Currency list (from fx page) */
const CURRENCIES = {
  TWD:{name:'新台幣',flag:'🇹🇼'},USD:{name:'美元',flag:'🇺🇸'},
  JPY:{name:'日圓',flag:'🇯🇵'},HKD:{name:'港幣',flag:'🇭🇰'},
  CNY:{name:'人民幣',flag:'🇨🇳'},EUR:{name:'歐元',flag:'🇪🇺'},
  GBP:{name:'英鎊',flag:'🇬🇧'},KRW:{name:'韓元',flag:'🇰🇷'},
  SGD:{name:'新幣',flag:'🇸🇬'},AUD:{name:'澳幣',flag:'🇦🇺'},
  THB:{name:'泰銖',flag:'🇹🇭'},MYR:{name:'馬幣',flag:'🇲🇾'},
  PHP:{name:'菲律賓披索',flag:'🇵🇭'},VND:{name:'越南盾',flag:'🇻🇳'},
  CAD:{name:'加幣',flag:'🇨🇦'},CHF:{name:'瑞士法郎',flag:'🇨🇭'},
};

const CAT = {
  food:    {label:'餐飲',icon:'🍜',color:'var(--cat-food)',    bg:'#FFF3E0'},
  transport:{label:'交通',icon:'🚇',color:'var(--cat-transport)',bg:'#E3F0FC'},
  hotel:   {label:'住宿',icon:'🏨',color:'var(--cat-hotel)',   bg:'#F3E5F5'},
  shop:    {label:'購物',icon:'🛍',color:'var(--cat-shop)',    bg:'#FFEBEE'},
  ticket:  {label:'門票',icon:'🎟',color:'var(--cat-ticket)',  bg:'#E8F5E9'},
  other:   {label:'其他',icon:'📌',color:'var(--cat-other)',   bg:'#ECEFF1'},
};

const fmtTWD = v => Math.round(v).toLocaleString('zh-TW');
const fmtNum = (v, d=0) => Number(v).toLocaleString('zh-TW',{minimumFractionDigits:d,maximumFractionDigits:d});
const pad2 = n => n.toString().padStart(2,'0');
const isoDate = d => { const x=new Date(d); return x.getFullYear()+'-'+pad2(x.getMonth()+1)+'-'+pad2(x.getDate()); };
const todayISO = () => isoDate(new Date());
function defaultEntryDate(){
  const t=todayISO();
  if(trip&&trip.start&&trip.end){ if(t<trip.start) return trip.start; if(t>trip.end) return trip.end; }
  return t;
}

/* ── State ── */
let trip = null;       // {name, dest, start, end, budget, currency, members:[]}
let entries = [];      // [{id,ts,amount,currency,twd,rate,rateMode,customRate,cat,desc,payer}]
let library = { activeId:null, trips:[] }; // 旅遊記憶: [{id,trip,entries,updatedAt}]
let setupMode = 'new'; // 'new' | 'edit'
let bankDetails = null;
let rateMode = 'live';
let selectedCat = 'food';
let selectedPayer = 0;
let editId = null;

const LIB_KEY = 'calcbox_trips_v1';

/* ════ FX ════ */
async function fetchWithTimeout(url, ms=7000){
  const ctrl = new AbortController();
  const t = setTimeout(()=>ctrl.abort(), ms);
  return fetch(url+'?_='+Date.now(), {signal:ctrl.signal}).finally(()=>clearTimeout(t));
}

function twdPerUnit(code){
  if(code==='TWD') return 1;
  if(!bankDetails||!bankDetails[code]) return null;
  const d = bankDetails[code];
  const q = (d.spot&&d.spot.buy&&d.spot.sell)?d.spot:d.cash;
  if(q&&q.buy&&q.sell) return (Number(q.buy)+Number(q.sell))/2;
  return null;
}

function getLiveRate(code){
  if(code==='TWD') return 1;
  return twdPerUnit(code);
}

async function loadRates(){
  setRateDot('loading','載入匯率中');
  // try localStorage first
  try{
    const raw=localStorage.getItem(FX_CACHE_KEY);
    if(raw){const d=JSON.parse(raw);if(d&&d.details){bankDetails=d.details;setRateDot('ok','牌告暫存');}}
  }catch(e){}
  // fetch fresh
  try{
    const r = await fetchWithTimeout(LOCAL_RATE_URL);
    if(!r.ok) throw new Error('http '+r.status);
    const d = await r.json();
    if(!d.details) throw new Error('no details');
    bankDetails = d.details;
    // save to localStorage
    try{localStorage.setItem(FX_CACHE_KEY,JSON.stringify({details:d.details,updateTime:d.updateTime,savedAt:new Date().toISOString()}));}catch(e){}
    const t = d.updateTime||'';
    setRateDot('ok', t ? '牌告 '+t.slice(5,16) : '已更新');
  }catch(e){
    if(!bankDetails) setRateDot('err','匯率載入失敗');
    else setRateDot('warn','使用暫存匯率');
  }
  updateRatePreview();
}

function setRateDot(state, text){
  const dot=document.getElementById('rate-dot');
  const label=document.getElementById('rate-status');
  dot.className='dot';
  if(state==='ok') dot.classList.add('ok');
  else if(state==='loading') dot.classList.add('loading');
  else if(state==='warn'){ dot.style.background='#FF9800'; }
  else dot.classList.add('err');
  label.textContent=text;
}

function getEffectiveRate(code){
  if(code==='TWD') return 1;
  if(rateMode==='custom'){
    const v=parseFloat(document.getElementById('e-custom-rate')?.value);
    return v&&v>0?v:null;
  }
  return getLiveRate(code);
}

/* ════ Currency selects ════ */
function buildCurrencyOptions(selectEl, selected){
  selectEl.innerHTML='';
  Object.entries(CURRENCIES).forEach(([code,info])=>{
    const o=document.createElement('option');
    o.value=code;
    o.textContent=info.flag+' '+code+' '+info.name;
    if(code===selected) o.selected=true;
    selectEl.appendChild(o);
  });
}

/* ════ Setup ════ */
let members=[{name:''}];

function renderMembers(){
  const list=document.getElementById('member-list');
  list.innerHTML=members.map((m,i)=>`
    <div class="member-row">
      <div class="member-badge">${String.fromCharCode(65+i)}</div>
      <input class="member-input" type="text" value="${m.name||''}" placeholder="成員 ${String.fromCharCode(65+i)}" maxlength="8" oninput="members[${i}].name=this.value">
      ${members.length>1?`<button class="member-del" onclick="delMember(${i})">×</button>`:'<div style="width:32px"></div>'}
    </div>`).join('');
}

function addMember(){
  if(members.length>=8){alert('最多8位成員');return;}
  members.push({name:''});
  renderMembers();
}

function delMember(i){
  if(members.length<=1) return;
  members.splice(i,1);
  renderMembers();
}

function startTrip(){
  const name=document.getElementById('s-name').value.trim();
  const budget=parseFloat(document.getElementById('s-budget').value)||0;
  const currency=document.getElementById('s-currency').value;
  const start=document.getElementById('s-start').value;
  const end=document.getElementById('s-end').value;
  if(!name){alert('請輸入旅程名稱');return;}
  if(start&&end&&end<start){alert('回程日期不可早於出發日期');return;}
  const memberNames=members.map((m,i)=>m.name.trim()||String.fromCharCode(65+i));

  if(setupMode==='edit' && trip){
    // 編輯目前旅程：保留記帳資料，只更新設定
    trip={...trip,name,start,end,budget,currency,members:memberNames};
  }else{
    // 建立新旅程：封存舊的，開一筆新記憶
    trip={name,start,end,budget,currency,members:memberNames};
    entries=[];
    library.activeId=genTripId();
  }
  saveData();
  showTrip();
}

function genTripId(){ return 't'+Date.now().toString(36)+Math.random().toString(36).slice(2,5); }

function showTrip(){
  if(entries&&entries.length) entries.sort((a,b)=>b.ts-a.ts);
  document.getElementById('page-setup').classList.remove('active');
  document.querySelectorAll('.bnav-btn:not(.add-btn)').forEach(b=>b.style.display='');
  document.querySelector('.bnav-btn.add-btn').style.display='';
  switchPage('home');
}

  setupMode = trip ? 'edit' : 'new';
  document.getElementById('form-heading').textContent = trip ? '編輯旅程' : '旅程資訊';

/* ════ 旅遊記憶（多旅程庫）════ */
function newTrip(){
  saveData(); // 先封存目前旅程
  setupMode='new';
  trip=null; entries=[];
  document.getElementById('form-heading').textContent='建立新旅程';
  document.getElementById('s-name').value='';
  document.getElementById('s-budget').value='';
  const today=new Date(); const end=new Date(); end.setDate(end.getDate()+7);
  document.getElementById('s-start').value=isoDate(today);
  document.getElementById('s-end').value=isoDate(end);
  document.getElementById('s-currency').value='JPY';
  members=[{name:''}]; renderMembers();
  renderSetupLibrary();
  window.scrollTo(0,0);
}

function switchToTrip(id){
  if(id===library.activeId) { showTrip(); return; }
  saveData(); // 封存目前
  const rec=library.trips.find(t=>t.id===id);
  if(!rec) return;
  trip=rec.trip; entries=rec.entries||[]; library.activeId=id;
  persistLibrary();
  showTrip();
}

function deleteTrip(id, ev){
  if(ev) ev.stopPropagation();
  const rec=library.trips.find(t=>t.id===id);
  if(!rec) return;
  if(!confirm(`確定刪除「${rec.trip.name}」？此旅程的記帳將永久移除，無法復原。`)) return;
  library.trips=library.trips.filter(t=>t.id!==id);
  if(library.activeId===id){
    if(library.trips.length){
      const next=library.trips[0];
      library.activeId=next.id; trip=next.trip; entries=next.entries||[];
      persistLibrary(); showTrip(); return;
    }else{
      library.activeId=null; trip=null; entries=[];
      persistLibrary();
      newTrip();
      return;
    }
  }
  persistLibrary();
  renderSetupLibrary();
}

function deleteCurrentTrip(){
  if(library.activeId) deleteTrip(library.activeId);
}

function renderSetupLibrary(){
  const card=document.getElementById('library-card');
  const list=document.getElementById('trip-library');
  if(!library.trips.length){ card.style.display='none'; return; }
  card.style.display='';
  const sorted=[...library.trips].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
  list.innerHTML=sorted.map(rec=>{
    const t=rec.trip;
    const total=(rec.entries||[]).reduce((s,e)=>s+e.twd,0);
    const dates=t.start&&t.end?(t.start.replace(/-/g,'/')+'–'+t.end.slice(5).replace(/-/g,'/')):'';
    const isCur=rec.id===library.activeId;
    return `<div class="lib-trip ${isCur?'current':''}" onclick="switchToTrip('${rec.id}')">
      <div class="lib-icon">✈️</div>
      <div class="lib-info">
        <div class="lib-name">${t.name||'未命名旅程'} ${isCur?'<span class="lib-badge-current">目前</span>':''}</div>
        <div class="lib-meta">${dates}　${(rec.entries||[]).length} 筆　NT$ ${fmtTWD(total)}</div>
      </div>
      <span class="lib-cur">${t.currency||''}</span>
      <button class="lib-del" onclick="deleteTrip('${rec.id}',event)">×</button>
    </div>`;
  }).join('');
}

function updateRatePreview(){
  const cur=document.getElementById('e-currency')?.value||'JPY';
  const amt=parseFloat(document.getElementById('e-amount')?.value)||0;
  const rate=getEffectiveRate(cur);
  const info=document.getElementById('rate-info-line');
  const prev=document.getElementById('twd-preview');
  if(!prev) return;

  if(cur==='TWD'){
    prev.innerHTML=amt?`≈ <b>NT$ ${fmtTWD(amt)}</b>`:'';
    if(info) info.textContent='';
    return;
  }
  if(!rate){
    prev.textContent='匯率無法取得，請切換「自訂」模式';
    if(info) info.textContent='';
    return;
  }
  document.getElementById('custom-cur-label').textContent=cur;
  const twd=amt*rate;
  prev.innerHTML=amt?`≈ <b>NT$ ${fmtTWD(twd)}</b>`:'輸入金額後自動換算台幣';
  if(info){
    const src=rateMode==='custom'?'自訂匯率':`台銀牌告均價`;
    info.textContent=`1 ${cur} ≈ NT$ ${Number(rate).toFixed(cur==='JPY'||cur==='KRW'||cur==='VND'?4:2)}（${src}）`;
  }
}

function submitEntry(){
  const amt=parseFloat(document.getElementById('e-amount').value);
  if(!amt||amt<=0){alert('請輸入有效金額');return;}
  const cur=document.getElementById('e-currency').value;
  const desc=document.getElementById('e-desc').value.trim();
  const rate=getEffectiveRate(cur);
  if(!rate&&cur!=='TWD'){alert('匯率無法取得，請使用自訂匯率');return;}
  const twd=cur==='TWD'?amt:amt*rate;
  const customRate=rateMode==='custom'?parseFloat(document.getElementById('e-custom-rate').value):null;

  // 以選定日期組合時間戳（編輯保留原時分秒，新增用當下時間）
  const dateStr=document.getElementById('e-date').value||defaultEntryDate();
  let ts;
  if(editId){
    const old=entries.find(e=>e.id===editId);
    const od=old?new Date(old.ts):new Date();
    ts=new Date(dateStr+'T'+pad2(od.getHours())+':'+pad2(od.getMinutes())+':'+pad2(od.getSeconds())).getTime();
  }else{
    const now=new Date();
    ts=new Date(dateStr+'T'+pad2(now.getHours())+':'+pad2(now.getMinutes())+':'+pad2(now.getSeconds())).getTime();
  }

  const entry={
    id:editId||Date.now().toString(36)+Math.random().toString(36).slice(2,5),
    ts:ts,
    amount:amt, currency:cur, twd:Math.round(twd),
    rate:rate||null, rateMode, customRate:customRate||null,
    cat:selectedCat, desc, payer:trip.members[selectedPayer]||trip.members[0]
  };

  if(editId){
    const idx=entries.findIndex(e=>e.id===editId);
    if(idx>=0) entries[idx]=entry;
  }else{
    entries.unshift(entry);
  }
  entries.sort((a,b)=>b.ts-a.ts);
  saveData();
  closeSheet();
  if(document.getElementById('page-home').classList.contains('active')) renderHome();
  if(document.getElementById('page-list').classList.contains('active')) renderList();
  gtag&&gtag('event','calculate',{tool:'trip-entry'});
}

/* ── Category SVG donut chart ── */
function renderCatChart(){
  const totals={};
  Object.keys(CAT).forEach(k=>totals[k]=0);
  entries.forEach(e=>{totals[e.cat||'other']=(totals[e.cat||'other']||0)+e.twd;});
  const totalAll=Object.values(totals).reduce((a,b)=>a+b,0)||0;
  const sorted=Object.entries(totals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);

  if(!sorted.length){
    document.getElementById('cat-chart').innerHTML='<div style="text-align:center;padding:1.5rem;color:var(--hint);font-size:12px">尚無消費資料</div>';
    document.getElementById('cat-legend').innerHTML='';
    return;
  }

  const W=200,H=200,cx=W/2,cy=H/2,r=66,sw=28;
  const C=2*Math.PI*r;
  // 色碼（取 CSS 變數對應的實際色，供 SVG stroke 使用）
  const CATHEX={food:'#E65100',transport:'#1565C0',hotel:'#6A1B9A',shop:'#C62828',ticket:'#2E7D32',other:'#546E7A'};
  let offset=0,arcs='';
  sorted.forEach(([cat,val])=>{
    const frac=val/totalAll;
    const len=frac*C;
    const col=CATHEX[cat]||'#546E7A';
    arcs+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${col}" stroke-width="${sw}"
      stroke-dasharray="${len.toFixed(2)} ${(C-len).toFixed(2)}" stroke-dashoffset="${(-offset).toFixed(2)}"
      transform="rotate(-90 ${cx} ${cy})"><title>${(CAT[cat]||CAT.other).label}：NT$ ${fmtTWD(val)} (${(frac*100).toFixed(0)}%)</title></circle>`;
    offset+=len;
  });

  const svg=`<svg viewBox="0 0 ${W} ${H}" style="max-width:230px;margin:0 auto;display:block">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#F0F2F5" stroke-width="${sw}"/>
    ${arcs}
    <text x="${cx}" y="${cy-2}" text-anchor="middle" font-size="22" font-weight="800" fill="#16212E" font-family="'Space Grotesk',sans-serif">$${fmtTWD(totalAll)}</text>
    <text x="${cx}" y="${cy+16}" text-anchor="middle" font-size="11" fill="#98A4B3" font-family="'Noto Sans TC',sans-serif">總花費</text>
  </svg>`;
  document.getElementById('cat-chart').innerHTML=svg;

  // legend（含百分比）
  document.getElementById('cat-legend').innerHTML=sorted.map(([cat,val])=>{
    const info=CAT[cat]||CAT.other;
    const pct=(val/totalAll*100).toFixed(0);
    return `<span><i style="background:${CATHEX[cat]||'#546E7A'}"></i>${info.label} ${pct}%</span>`;
  }).join('');
}

/* ── Canvas helper：像素尺寸只初始化一次，dpr 鎖定一次（鐵則 1+2）── */
function prepCanvas(cv,W,H){
  if(!cv.dataset.sized){
    const dpr=Math.max(1,Math.min(3,Math.round(window.devicePixelRatio||1)));
    cv.width=W*dpr; cv.height=H*dpr;
    cv.style.width='100%'; cv.style.height='auto';
    cv.dataset.sized='1'; cv.dataset.dpr=dpr;
  }
  const dpr=parseFloat(cv.dataset.dpr)||1;
  const ctx=cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  return ctx;
}

/* ── 旅程日期序列（含起訖；無日期則用記帳日）── */
function tripDayList(){
  if(trip&&trip.start&&trip.end){
    const out=[]; let d=new Date(trip.start+'T00:00:00'); const end=new Date(trip.end+'T00:00:00');
    let g=0; while(d<=end&&g<400){ out.push(isoDate(d)); d.setDate(d.getDate()+1); g++; }
    return out;
  }
  return [...new Set(entries.map(e=>isoDate(e.ts)))].sort();
}

/* ── 預算燃燒圖：實際累積 vs 理想配速 ── */
function renderBurndownChart(){
  const cv=document.getElementById('burn-chart'); if(!cv) return;
  const W=420,H=190;
  const legend=document.getElementById('burn-legend');
  const days=tripDayList();

  if(!entries.length||days.length<1){
    const ctx=prepCanvas(cv,W,H);
    ctx.fillStyle='#98A4B3';ctx.font='12px "Noto Sans TC",sans-serif';ctx.textAlign='center';
    ctx.fillText('開始記帳後顯示燃燒圖',W/2,H/2);
    if(legend) legend.innerHTML=''; return;
  }

  const dayMap={};
  entries.forEach(e=>{const k=isoDate(e.ts);dayMap[k]=(dayMap[k]||0)+e.twd;});
  const todayK=todayISO();
  const n=days.length;
  const budget=trip.budget||0;
  const idealPer=budget?budget/n:0;

  const actualCum=[]; let run=0,lastIdx=-1;
  days.forEach((k,i)=>{ run+=dayMap[k]||0; if(k<=todayK){actualCum[i]=run;lastIdx=i;} else actualCum[i]=null; });
  if(lastIdx<0){ run=dayMap[days[0]]||0; actualCum[0]=run; lastIdx=0; }

  const maxActual=Math.max(...actualCum.filter(v=>v!=null),0);
  const yMax=(Math.max(budget,maxActual)*1.08)||1; // 動態 Y（鐵則 3）

  const ctx=prepCanvas(cv,W,H);
  const padL=50,padR=16,padT=16,padB=34;
  const plotW=W-padL-padR,plotH=H-padT-padB;
  const X=i=>padL+(n<=1?plotW/2:i/(n-1)*plotW);
  const Y=v=>padT+plotH-(v/yMax)*plotH;

  // grid + y labels
  ctx.strokeStyle='#EDF1F7';ctx.lineWidth=1;
  ctx.fillStyle='#98A4B3';ctx.font='10px "Space Grotesk",sans-serif';ctx.textAlign='right';
  const yStep=Math.max(1000,Math.ceil(yMax/3/1000)*1000);
  for(let v=0;v<=yMax;v+=yStep){const y=Y(v);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();ctx.fillText('$'+fmtTWD(v),padL-5,y+3.5);}

  // 理想配速線（金色虛線）
  if(budget){
    ctx.strokeStyle='#C28A1A';ctx.lineWidth=2;ctx.setLineDash([6,5]);
    ctx.beginPath();
    days.forEach((_,i)=>{const x=X(i),y=Y(idealPer*(i+1));i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
    ctx.stroke();ctx.setLineDash([]);
  }

  // 實際累積（深藍面積+線，畫到今天）
  ctx.save();
  const grd=ctx.createLinearGradient(0,padT,0,padT+plotH);
  grd.addColorStop(0,'rgba(27,58,92,.22)');grd.addColorStop(1,'rgba(27,58,92,.02)');
  ctx.fillStyle=grd;ctx.beginPath();ctx.moveTo(X(0),padT+plotH);
  for(let i=0;i<=lastIdx;i++)ctx.lineTo(X(i),Y(actualCum[i]));
  ctx.lineTo(X(lastIdx),padT+plotH);ctx.closePath();ctx.fill();ctx.restore();

  ctx.strokeStyle='#1B3A5C';ctx.lineWidth=2.5;ctx.lineJoin='round';ctx.beginPath();
  for(let i=0;i<=lastIdx;i++){const x=X(i),y=Y(actualCum[i]);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
  ctx.stroke();

  // 末點：超前理想=綠、落後=紅
  const over = budget ? actualCum[lastIdx] > idealPer*(lastIdx+1) : false;
  const dotCol=budget?(over?'#C62828':'#2E7D32'):'#1B3A5C';
  const lx=X(lastIdx),ly=Y(actualCum[lastIdx]);
  ctx.fillStyle=dotCol;ctx.beginPath();ctx.arc(lx,ly,4.5,0,7);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(lx,ly,2.3,0,7);ctx.fill();
  ctx.fillStyle=dotCol;ctx.font='bold 9.5px "Space Grotesk",sans-serif';ctx.textAlign=lastIdx>n-2?'right':'center';
  ctx.fillText('$'+fmtTWD(actualCum[lastIdx]),lx,ly-9);

  // x labels（疏化）
  ctx.fillStyle='#98A4B3';ctx.font='10px "Space Grotesk",sans-serif';ctx.textAlign='center';
  const step=Math.max(1,Math.ceil(n/6));
  days.forEach((k,i)=>{ if(i%step!==0 && i!==n-1) return; const p=k.split('-'); ctx.fillText(parseInt(p[1])+'/'+parseInt(p[2]),X(i),H-padB+15);});

  if(legend){
    const status=!budget?'未設定預算':(over?'<span style="color:var(--red)">超出配速</span>':'<span style="color:var(--green)">配速健康</span>');
    legend.innerHTML=`<span><i style="background:#1B3A5C"></i>實際累積</span>
      <span><i style="background:#C28A1A"></i>理想配速</span>
      <span style="margin-left:auto">${status}</span>`;
  }
}

/* ── 每日支出長條圖（含每日額度參考線）── */
function renderDailyChart(){
  const cv=document.getElementById('daily-chart'); if(!cv) return;
  const W=420,H=180;
  const ctx=prepCanvas(cv,W,H);

  if(!entries.length){
    ctx.fillStyle='#98A4B3';ctx.font='12px "Noto Sans TC",sans-serif';ctx.textAlign='center';
    ctx.fillText('尚無資料',W/2,H/2);return;
  }

  const dayMap={};
  entries.forEach(e=>{const k=isoDate(e.ts);dayMap[k]=(dayMap[k]||0)+e.twd;});
  const tdays=tripDayList();
  let keys=(tdays.length&&tdays.length<=31)?tdays:[...new Set(entries.map(e=>isoDate(e.ts)))].sort();
  const values=keys.map(k=>dayMap[k]||0);
  const allowance=(trip.budget&&tdays.length)?trip.budget/tdays.length:0;
  const maxV=(Math.max(Math.max(...values),allowance)*1.15)||1; // 動態 Y（鐵則 3）

  const padL=46,padR=14,padT=18,padB=32;
  const plotW=W-padL-padR,plotH=H-padT-padB;
  const X=i=>padL+(i+0.5)/keys.length*plotW;
  const Y=v=>padT+plotH-(v/maxV)*plotH;
  const barW=Math.min(28,(plotW/keys.length)*0.6);

  // grid + y labels
  ctx.strokeStyle='#EDF1F7';ctx.lineWidth=1;
  ctx.fillStyle='#98A4B3';ctx.font='10px "Space Grotesk",sans-serif';ctx.textAlign='right';
  const yStep=Math.max(1000,Math.ceil(maxV/3/1000)*1000);
  for(let v=0;v<=maxV;v+=yStep){const y=Y(v);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();ctx.fillText('$'+fmtTWD(v),padL-5,y+3.5);}

  // bars
  keys.forEach((k,i)=>{
    const v=values[i]; if(v<=0) return;
    const x=X(i),y=Y(v),h=padT+plotH-y;
    ctx.fillStyle = allowance>0 ? (v>allowance?'#C62828':'#2E7D32') : '#2D6CB5';
    const r=Math.min(4,barW/2);
    ctx.beginPath();
    ctx.moveTo(x-barW/2,y+r);
    ctx.arcTo(x-barW/2,y,x-barW/2+r,y,r);
    ctx.lineTo(x+barW/2-r,y);
    ctx.arcTo(x+barW/2,y,x+barW/2,y+r,r);
    ctx.lineTo(x+barW/2,y+h);ctx.lineTo(x-barW/2,y+h);ctx.closePath();ctx.fill();
    if(keys.length<=10){
      ctx.fillStyle='#1B3A5C';ctx.font='bold 9px "Space Grotesk",sans-serif';ctx.textAlign='center';
      ctx.fillText('$'+fmtTWD(v),x,y-5);
    }
  });

  // 每日額度線（金色虛線）
  if(allowance>0){
    const y=Y(allowance);
    ctx.strokeStyle='#C28A1A';ctx.lineWidth=1.5;ctx.setLineDash([5,4]);
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='#C28A1A';ctx.font='9px sans-serif';ctx.textAlign='left';
    ctx.fillText('每日額度 $'+fmtTWD(allowance),padL+2,y-3);
  }

  // x labels（疏化）
  ctx.fillStyle='#98A4B3';ctx.font='10px "Space Grotesk",sans-serif';ctx.textAlign='center';
  const step=Math.max(1,Math.ceil(keys.length/7));
  keys.forEach((k,i)=>{ if(i%step!==0 && i!==keys.length-1) return; const p=k.split('-'); ctx.fillText(parseInt(p[1])+'/'+parseInt(p[2]),X(i),H-padB+14);});
}

/* ════ Split ════ */
function renderSplit(){
  if(!trip){return;}
  const memberTotals={};
  const memberPaid={};
  trip.members.forEach(m=>{memberTotals[m]=0;memberPaid[m]=0;});
  const perEntry=entries.length/trip.members.length||0;
  const totalTWD=entries.reduce((s,e)=>s+e.twd,0);
  const share=totalTWD/trip.members.length;

  entries.forEach(e=>{
    if(memberPaid[e.payer]!==undefined) memberPaid[e.payer]+=e.twd;
  });

  // balance = paid - share
  const balance={};
  trip.members.forEach(m=>{balance[m]=memberPaid[m]-share;});

  // render members
  const el=document.getElementById('split-members');
  el.innerHTML=trip.members.map((m,i)=>{
    const b=balance[m];
    const cls=b>0.5?'pos':b<-0.5?'neg':'zero';
    const balText=b>0.5?`應收回 NT$ ${fmtTWD(b)}`:b<-0.5?`應付出 NT$ ${fmtTWD(-b)}`:'已結清';
    return `<div class="split-member">
      <div class="split-badge">${String.fromCharCode(65+i)}</div>
      <div class="split-info">
        <div class="split-name">${m}</div>
        <div class="split-amt">已付 NT$ ${fmtTWD(memberPaid[m])}　均攤 NT$ ${fmtTWD(share)}</div>
      </div>
      <div class="split-bal ${cls}">${balText}</div>
    </div>`;
  }).join('');

  // min transfers
  const creditors=[],debtors=[];
  Object.entries(balance).forEach(([m,v])=>{
    if(v>0.5) creditors.push([m,v]);
    else if(v<-0.5) debtors.push([m,-v]);
  });
  creditors.sort((a,b)=>b[1]-a[1]); debtors.sort((a,b)=>b[1]-a[1]);
  const cr=creditors.map(x=>[...x]),db=debtors.map(x=>[...x]);
  const transfers=[];
  let ci=0,di=0;
  while(di<db.length&&ci<cr.length){
    const pay=Math.min(db[di][1],cr[ci][1]);
    transfers.push([db[di][0],cr[ci][0],Math.round(pay)]);
    db[di][1]-=pay; cr[ci][1]-=pay;
    if(db[di][1]<0.5)di++;
    if(cr[ci][1]<0.5)ci++;
  }

  const tel=document.getElementById('split-transfers');
  tel.innerHTML=transfers.length
    ?transfers.map(([f,t,a])=>`
      <div class="transfer-card">
        <span>${f}</span><span class="arrow">→</span><span>${t}</span>
        <span class="amt">NT$ ${fmtTWD(a)}</span>
      </div>`).join('')
    :'<div class="no-transfer">🎉 所有人均已結清，無需轉帳</div>';
}

/* ════ Export ════ */
function exportCSV(){
  if(!entries.length){alert('沒有消費記錄可匯出');return;}
  const header='日期時間,類別,說明,金額,幣別,台幣換算,付款人,匯率來源';
  const rows=entries.map(e=>{
    const d=new Date(e.ts);
    const dt=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes().toString().padStart(2,'0')}`;
    const cat=(CAT[e.cat]||CAT.other).label;
    return [dt,cat,e.desc||'',e.amount,e.currency,e.twd,e.payer,e.rateMode==='custom'?'自訂':'台銀牌告'].join(',');
  });
  const csv='\uFEFF'+[header,...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(trip?.name||'trip')+'_記帳.csv';
  a.click();
}

/* ════ Persist（旅遊記憶庫）════ */
function persistLibrary(){
  try{localStorage.setItem(LIB_KEY,JSON.stringify(library));}catch(e){console.warn('save failed',e);}
}

function saveData(){
  if(!trip) { persistLibrary(); return; }
  if(!library.activeId) library.activeId=genTripId();
  let rec=library.trips.find(t=>t.id===library.activeId);
  if(!rec){ rec={id:library.activeId,trip,entries,updatedAt:Date.now()}; library.trips.push(rec); }
  else { rec.trip=trip; rec.entries=entries; rec.updatedAt=Date.now(); }
  persistLibrary();
}

function loadLibrary(){
  try{
    const raw=localStorage.getItem(LIB_KEY);
    if(raw){
      const d=JSON.parse(raw);
      if(d&&Array.isArray(d.trips)&&d.trips.length){
        library=d;
        const act=library.trips.find(t=>t.id===library.activeId)||library.trips[0];
        if(act){ trip=act.trip; entries=(act.entries||[]).slice().sort((a,b)=>b.ts-a.ts); library.activeId=act.id; return true; }
      }
      return false;
    }
    // 舊版單一旅程資料 → 遷移為第一筆旅遊記憶
    const old=localStorage.getItem(STORAGE_KEY);
    if(old){
      const d=JSON.parse(old);
      if(d&&d.trip){
        const id=genTripId();
        trip=d.trip; entries=(d.entries||[]).slice().sort((a,b)=>b.ts-a.ts);
        library={activeId:id,trips:[{id,trip,entries,updatedAt:Date.now()}]};
        persistLibrary();
        return true;
      }
    }
  }catch(e){}
  return false;
}
